name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install Rust target for Soroban WASM
        run: rustup target add wasm32v1-none
      - run: npm ci
      - run: npm test
      - run: npm run prove
      - run: npm run contract:test
      - run: npm run contract:build
      - run: npm run demo
      - run: npm run stellar
      - run: npm run build
